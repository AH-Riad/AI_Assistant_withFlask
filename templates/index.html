<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Personal Assistant</title>
  </head>
  <body>
    <h1 class="main-heading">AI Personal Assistant</h1>
    <div class="container">
      <h2>Ask anything</h2>
      <form id="askForm">
        <input
          type="text"
          name="question"
          placeholder="Ask a question..."
          required
        />
        <button type="submit">Ask</button>
      </form>
      <p id="ans-loading" style="display: none">Processing...</p>
      <p id="answer"></p>
    </div>

    <hr />

    <h2>Summarize Email</h2>
    <form id="emailForm">
      <textarea
        name="email-text"
        placeholder="Paste email content here..."
      ></textarea>
      <button type="submit">Summarize</button>
    </form>
    <p id="summary-loading" style="display: none">Processing...</p>
    <p id="summary"></p>
  </body>
</html>
